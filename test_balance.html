<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Display Test</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: #f0f0f0; 
        }
        .test-case { 
            background: white; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 5px; 
            border-left: 4px solid #007bff; 
        }
        .test-case.pass { border-left-color: #28a745; }
        .test-case.fail { border-left-color: #dc3545; }
    </style>
</head>
<body>
    <h1>Balance Display Formatting Test</h1>
    <div id="test-results"></div>

    <script>
        function formatBalanceDisplay(balance) {
            // Handle the specific rounding logic
            if (balance === 1) {
                return '1';
            }
            
            if (balance < 1) {
                // Truncate to 2 decimal places (don't round up)
                const truncated = Math.floor(balance * 100) / 100;
                return truncated.toString().replace('.', ',');
            }
            
            // For values >= 1, use normal formatting
            if (balance === Math.floor(balance)) {
                return balance.toString();
            } else {
                return balance.toString().replace('.', ',');
            }
        }

        const testCases = [
            { input: 0.9997108, expected: '0,99' },
            { input: 0.999, expected: '0,99' },
            { input: 0.996, expected: '0,99' },
            { input: 1, expected: '1' },
            { input: 0.994, expected: '0,98' },
            { input: 1.5, expected: '1,5' },
            { input: 2, expected: '2' },
            { input: 2.123, expected: '2,123' },
            { input: 0.1, expected: '0,1' },
            { input: 0.01, expected: '0,01' }
        ];

        const resultsDiv = document.getElementById('test-results');
        let allPassed = true;

        testCases.forEach((testCase, index) => {
            const result = formatBalanceDisplay(testCase.input);
            const passed = result === testCase.expected;
            allPassed = allPassed && passed;

            const testDiv = document.createElement('div');
            testDiv.className = `test-case ${passed ? 'pass' : 'fail'}`;
            testDiv.innerHTML = `
                <strong>Test ${index + 1}:</strong> formatBalanceDisplay(${testCase.input}) 
                → "${result}" 
                ${passed ? '✓' : `✗ (expected "${testCase.expected}")`}
            `;
            resultsDiv.appendChild(testDiv);
        });

        const summary = document.createElement('div');
        summary.style.marginTop = '20px';
        summary.style.padding = '10px';
        summary.style.background = allPassed ? '#d4edda' : '#f8d7da';
        summary.style.border = `1px solid ${allPassed ? '#c3e6cb' : '#f5c6cb'}`;
        summary.style.borderRadius = '5px';
        summary.innerHTML = `<strong>Overall: ${allPassed ? 'All tests passed! ✓' : 'Some tests failed ✗'}</strong>`;
        resultsDiv.appendChild(summary);
    </script>
</body>
</html>
